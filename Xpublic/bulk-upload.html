<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulk Upload</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">CooperativeHub Admin</span>
      <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block bg-light sidebar" style="min-height: 100vh;">
        <div class="position-sticky pt-3">
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="admin-dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="members.html">Members</a></li>
            <li class="nav-item"><a class="nav-link active" href="bulk-upload.html">Bulk Upload</a></li>
            <li class="nav-item"><a class="nav-link" href="transactions.html">Transactions</a></li>
            <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
          </ul>
        </div>
      </nav>

      <main class="col-md-10 ms-sm-auto px-md-4">
        <h2>Bulk Upload Members</h2>
        <p>Upload an Excel (.xlsx) file with columns: First Name, Last Name, Phone</p>
        <form id="bulkUploadForm" enctype="multipart/form-data">
          <div class="mb-3">
            <input type="file" class="form-control" id="fileInput" accept=".xlsx" required />
          </div>
          <button type="submit" class="btn btn-primary">Upload</button>
        </form>
        <div id="uploadProgress" class="mt-3"></div>
        <div id="uploadResults" class="mt-3"></div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
  <script>
    document.getElementById('bulkUploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = document.getElementById('fileInput').files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('file', file);
      const results = await bulkUploadMembers(formData);
      document.getElementById('uploadResults').innerHTML = `
        <h5>Success: ${results.results.success.length}</h5>
        <ul>${results.results.success.map(m => `<li>${m.firstName} ${m.lastName} (${m.memberId})</li>`).join('')}</ul>
        <h5>Failed: ${results.results.failed.length}</h5>
        <ul>${results.results.failed.map(m => `<li>${m.firstName} ${m.lastName} - ${m.error}</li>`).join('')}</ul>
      `;
    });
    document.getElementById('logoutBtn').addEventListener('click', logout);
  </script>
</body>
</html>
