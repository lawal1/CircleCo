<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">CooperativeHub Admin</span>
      <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block bg-light sidebar" style="min-height: 100vh;">
        <div class="position-sticky pt-3">
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="admin-dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" href="members.html">Members</a></li>
            <li class="nav-item"><a class="nav-link" href="bulk-upload.html">Bulk Upload</a></li>
            <li class="nav-item"><a class="nav-link" href="transactions.html">Transactions</a></li>
            <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
          </ul>
        </div>
      </nav>

      <main class="col-md-10 ms-sm-auto px-md-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
          <h1 class="h2">Members</h1>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addMemberModal">Add Member</button>
        </div>
        <table class="table table-striped" id="membersTable">
          <thead>
            <tr><th>Member ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Balance</th><th>Actions</th></tr>
          </thead>
          <tbody id="membersBody"></tbody>
        </table>
      </main>
    </div>
  </div>

  <!-- Add Member Modal -->
  <div class="modal fade" id="addMemberModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="addMemberForm">
          <div class="modal-header">
            <h5>Add Member</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3"><label>First Name</label><input type="text" class="form-control" id="firstName" required /></div>
            <div class="mb-3"><label>Last Name</label><input type="text" class="form-control" id="lastName" required /></div>
            <div class="mb-3"><label>Phone</label><input type="tel" class="form-control" id="phone" required /></div>
            <div class="mb-3"><label>Email (optional)</label><input type="email" class="form-control" id="email" /></div>
          </div>
          <div class="modal-footer"><button type="submit" class="btn btn-primary">Create</button></div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
      await loadMembers();
    });
    document.getElementById('addMemberForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value || undefined,
      };
      await createMember(data);
      location.reload();
    });
    document.getElementById('logoutBtn').addEventListener('click', logout);
  </script>
</body>
</html>
