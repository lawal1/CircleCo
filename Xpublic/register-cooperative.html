<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Cooperative</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="bg-light">
  <div class="container" style="max-width: 500px; margin-top: 50px;">
    <div class="card shadow">
      <div class="card-body">
        <h3 class="text-center mb-4">Register Your Cooperative</h3>
        <form id="registerForm">
          <div class="mb-3">
            <label for="name" class="form-label">Cooperative Name</label>
            <input type="text" class="form-control" id="name" required />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Admin Email</label>
            <input type="email" class="form-control" id="email" required />
          </div>
          <div class="mb-3">
            <label for="phone" class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" required />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required minlength="6" />
          </div>
          <div class="mb-3">
            <label for="cacNumber" class="form-label">CAC Number (optional)</label>
            <input type="text" class="form-control" id="cacNumber" />
          </div>
          <button type="submit" class="btn btn-primary w-100">Create Cooperative</button>
        </form>
        <div id="registerError" class="text-danger mt-2"></div>
        <p class="mt-3 text-center">Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
        cacNumber: document.getElementById('cacNumber').value || undefined,
      };
      try {
        await registerCooperative(data);
        window.location.href = 'admin-dashboard.html';
      } catch (error) {
        document.getElementById('registerError').textContent = error.message;
      }
    });
  </script>
</body>
</html>
