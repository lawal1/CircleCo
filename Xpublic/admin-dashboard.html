<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">CooperativeHub Admin</span>
      <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-2 d-none d-md-block bg-light sidebar" style="min-height: 100vh;">
        <div class="position-sticky pt-3">
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link active" href="admin-dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="members.html">Members</a></li>
            <li class="nav-item"><a class="nav-link" href="bulk-upload.html">Bulk Upload</a></li>
            <li class="nav-item"><a class="nav-link" href="transactions.html">Transactions</a></li>
            <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
          </ul>
        </div>
      </nav>

      <!-- Main -->
      <main class="col-md-10 ms-sm-auto px-md-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
          <h1 class="h2">Dashboard</h1>
        </div>

        <!-- Stats cards -->
        <div class="row g-3 mb-4">
          <div class="col-md-3">
            <div class="card text-bg-primary">
              <div class="card-body">
                <h5 class="card-title">Total Members</h5>
                <p class="card-text fs-4" id="totalMembers">0</p>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-bg-success">
              <div class="card-body">
                <h5 class="card-title">Total Savings</h5>
                <p class="card-text fs-4" id="totalSavings">₦0</p>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-bg-warning">
              <div class="card-body">
                <h5 class="card-title">Pending Loans</h5>
                <p class="card-text fs-4" id="pendingLoans">0</p>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-bg-danger">
              <div class="card-body">
                <h5 class="card-title">Active Loans</h5>
                <p class="card-text fs-4" id="activeLoans">0</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Chart and Recent Transactions -->
        <div class="row">
          <div class="col-md-8">
            <canvas id="savingsChart" width="400" height="200"></canvas>
          </div>
          <div class="col-md-4">
            <div class="card">
              <div class="card-body">
                <h5>Recent Transactions</h5>
                <ul id="recentTransactions" class="list-group list-group-flush"></ul>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/charts.js"></script>
  <script>
   document.addEventListener('DOMContentLoaded', async () => {
  await checkAuth();
  await checkAdminRole();  // <-- add this
  await loadAdminDashboard();
  await loadSavingsChart();
});
    document.getElementById('logoutBtn').addEventListener('click', logout);
  </script>
</body>
</html>
