<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
      <span class="navbar-brand">CooperativeHub</span>
      <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row">
      <div class="col-md-4">
        <div class="card">
          <div class="card-body text-center">
            <h5>Welcome, <span id="memberName">Member</span></h5>
            <p>Member ID: <span id="memberId">-</span></p>
          </div>
        </div>
        <div class="card mt-3">
          <div class="card-body">
            <h5>Virtual Account</h5>
            <p><strong>Bank:</strong> <span id="bankName">-</span></p>
            <p><strong>Account Number:</strong> <span id="accountNumber">-</span></p>
            <button class="btn btn-sm btn-outline-secondary" onclick="copyAccountNumber()">Copy</button>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="row g-3">
          <div class="col-md-6">
            <div class="card text-bg-success">
              <div class="card-body">
                <h5>Savings Balance</h5>
                <p class="fs-4" id="balance">₦0</p>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card text-bg-info">
              <div class="card-body">
                <h5>Loan Eligibility</h5>
                <p id="eligibilityStatus">Checking...</p>
              </div>
            </div>
          </div>
        </div>
        <div class="card mt-3">
          <div class="card-body">
            <h5>Recent Transactions</h5>
            <ul id="recentTx" class="list-group list-group-flush"></ul>
            <a href="transactions.html" class="btn btn-link">View All</a>
          </div>
        </div>
        <div class="mt-3">
          <a href="loan-request.html" class="btn btn-primary">Request Loan</a>
          <a href="savings.html" class="btn btn-secondary">Savings History</a>
          <a href="virtual-account.html" class="btn btn-outline-dark">Virtual Account Details</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/member.js"></script>
  <script>
document.addEventListener('DOMContentLoaded', async () => {
  await checkAuth();
  await checkMemberRole();  // <-- add this
  await loadMemberDashboard();
});
    document.getElementById('logoutBtn').addEventListener('click', logout);
  </script>
</body>
</html>
