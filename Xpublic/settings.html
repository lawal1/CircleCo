      <form id="rulesForm">

        </div>
        <button type="submit" class="btn btn-primary">Update Rules</button>
      </form>
    </div>

    <!-- For Member: update profile, save card -->

      <h4>Profile</h4>
      <form id="profileForm">
        <div class="mb-3"><label>Phone</label><input type="tel" class="form-control" id="profilePhone" /></div>
        <button type="submit" class="btn btn-primary">Update Profile</button>
      </form>
      <h4 class="mt-4">Saved Card</h4>
      <p>Card saved: <span id="cardStatus">None</span></p>
    </div>
