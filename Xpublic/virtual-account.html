<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
      <span class="navbar-brand">CooperativeHub</span>
      <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2>Your Virtual Account</h2>
    <div class="card">
      <div class="card-body">
        <p><strong>Bank:</strong> <span id="vaBank">-</span></p>
        <p><strong>Account Number:</strong> <span id="vaNumber">-</span></p>
        <p><strong>Account Name:</strong> <span id="vaName">-</span></p>
        <button class="btn btn-secondary" onclick="copyAccountNumber()">Copy Number</button>
        <!-- QR Code can be added here with a library -->
      </div>
    </div>
    <a href="member-dashboard.html" class="btn btn-link mt-3">Back to Dashboard</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/member.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
      await loadVirtualAccount();
    });
    document.getElementById('logoutBtn').addEventListener('click', logout);
  </script>
</body>
</html>
