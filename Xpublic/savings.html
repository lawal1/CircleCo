<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savings History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
      <span class="navbar-brand">CooperativeHub – Savings</span>
      <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2>My Savings</h2>

    <!-- Summary Cards -->
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card text-bg-success">
          <div class="card-body">
            <h5 class="card-title">Current Balance</h5>
            <p class="card-text fs-4" id="balanceDisplay">₦0</p>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card text-bg-info">
          <div class="card-body">
            <h5 class="card-title">Total Contributions</h5>
            <p class="card-text fs-4" id="totalContributionDisplay">₦0</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Transaction Table -->
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Transaction History</h5>
        <table class="table table-striped" id="savingsTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Reference</th>
            </tr>
          </thead>
          <tbody id="savingsBody">
            <tr><td colspan="5" class="text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="mt-3">
      <a href="member-dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/member.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
      await loadSavingsPage();
    });
    document.getElementById('logoutBtn').addEventListener('click', logout);

    async function loadSavingsPage() {
      try {
        // Get savings balance
        const savings = await getSavingsBalance();
        document.getElementById('balanceDisplay').textContent = `₦${savings.balance || 0}`;
        document.getElementById('totalContributionDisplay').textContent = `₦${savings.totalContribution || 0}`;

        // Get all transactions and filter deposits
        const allTx = await getTransactions();
        // Filter only deposit/initial_deposit type (savings contributions)
        const savingsTx = allTx.filter(tx => 
          tx.type === 'deposit' || tx.type === 'initial_deposit' || tx.type === 'savings'
        );

        const tbody = document.getElementById('savingsBody');
        if (savingsTx.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="text-center">No savings transactions yet.</td></tr>`;
        } else {
          tbody.innerHTML = savingsTx.map(tx => `
            <tr>
              <td>${tx.createdAt ? new Date(tx.createdAt).toLocaleDateString() : '-'}</td>
              <td>${tx.type.replace('_', ' ')}</td>
              <td>₦${tx.amount}</td>
              <td>${tx.status || 'success'}</td>
              <td>${tx.reference || '-'}</td>
            </tr>
          `).join('');
        }
      } catch (error) {
        console.error('Failed to load savings:', error);
        document.getElementById('savingsBody').innerHTML = `<tr><td colspan="5" class="text-danger">Error loading data.</td></tr>`;
      }
    }
  </script>
</body>
</html>
