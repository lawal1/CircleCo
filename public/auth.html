<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CircleCo – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
  
  <style>
    /* Nomba Brand System Styling Override */
    :root {
      --nomba-yellow: #FFD400;
      --nomba-yellow-hover: #E6BE00;
      --nomba-dark: #0B0B0C;
      --nomba-dark-card: #141416;
      --nomba-gray-text: #7C7C80;
    }

    body {
      background-color: var(--nomba-dark) !important;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .card {
      background-color: var(--nomba-dark-card) !important;
      border: 1px solid #27272A !important;
      border-radius: 16px;
    }

    h2 {
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .form-label {
      color: #A1A1AA !important;
      font-weight: 500;
      font-size: 14px;
    }

    .form-control, .form-select {
      background-color: #1C1C1E !important;
      border: 1px solid #27272A !important;
      color: #FFFFFF !important;
      padding: 12px 16px;
      border-radius: 8px;
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--nomba-yellow) !important;
      box-shadow: 0 0 0 2px rgba(255, 212, 0, 0.2) !important;
    }

    .form-select {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23a1a1aa' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e") !important;
    }

    /* Custom Nav Tab Pills Styling */
    .nav-pills {
      background-color: #1C1C1E;
      padding: 6px;
      border-radius: 10px;
      border: 1px solid #27272A;
    }

    .nav-pills .nav-link {
      color: #A1A1AA !important;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .nav-pills .nav-link.active {
      background-color: var(--nomba-yellow) !important;
      color: var(--nomba-dark) !important;
    }

    /* Target primary action buttons without renaming existing IDs */
    #loginBtn {
      background-color: var(--nomba-yellow) !important;
      border: none !important;
      color: var(--nomba-dark) !important;
      font-weight: 700;
      padding: 14px;
      border-radius: 8px;
      transition: background-color 0.2s ease;
    }

    #loginBtn:hover {
      background-color: var(--nomba-yellow-hover) !important;
    }

    #registerBtn {
      background-color: transparent !important;
      border: 1px solid var(--nomba-yellow) !important;
      color: var(--nomba-yellow) !important;
      font-weight: 700;
      padding: 14px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    #registerBtn:hover {
      background-color: var(--nomba-yellow) !important;
      color: var(--nomba-dark) !important;
    }

    .alert {
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <h2 class="text-center mb-4 text-white">
              Circle<span class="text-warning">Co</span>
            </h2>

            <!-- Tab Navigation -->
            <ul class="nav nav-pills nav-fill mb-4" id="authTab" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register Co-op</button>
              </li>
            </ul>

            <div class="tab-content">
              <!-- LOGIN TAB -->
              <div class="tab-pane fade show active" id="login" role="tabpanel">
                <form id="loginForm">
                  <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="loginPhone" placeholder="08012345678" required />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Password / PIN</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Password or 4-digit PIN" required />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">I am a...</label>
                    <select class="form-select" id="loginRole">
                      <option value="admin">Admin</option>
                      <option value="member">Member</option>
                    </select>
                  </div>
                  <button type="submit" class="btn btn-primary w-100" id="loginBtn">Sign In</button>
                </form>
                <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
              </div>

              <!-- REGISTER TAB -->
              <div class="tab-pane fade" id="register" role="tabpanel">
                <form id="registerForm">
                  <div class="mb-3">
                    <label class="form-label">Cooperative Name</label>
                    <input type="text" class="form-control" id="regCoopName" required />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Admin Full Name</label>
                    <input type="text" class="form-control" id="regAdminName" required />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Admin Phone</label>
                    <input type="tel" class="form-control" id="regAdminPhone" required />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Admin Email</label>
                    <input type="email" class="form-control" id="regAdminEmail" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="regPassword" required />
                  </div>
                  <button type="submit" class="btn btn-success w-100" id="registerBtn">Register Co-op</button>
                </form>
                <div id="registerError" class="alert alert-danger mt-3 d-none"></div>
                <div id="registerSuccess" class="alert alert-success mt-3 d-none"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script>
    // ---- LOGIN ----
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone = document.getElementById('loginPhone').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const role = document.getElementById('loginRole').value;
      const errorEl = document.getElementById('loginError');

      if (!phone || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.classList.remove('d-none');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password, role }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('cooperativeId', data.cooperativeId);

        if (data.role === 'admin') {
          window.location.href = '/admin.html';
        } else {
          // Member: check if first login
          if (data.hasCompletedFirstLogin === false) {
            // Save phone for PIN setup, redirect to member page with flag
            localStorage.setItem('tempPhone', phone);
            window.location.href = '/member.html?first=true';
          } else {
            window.location.href = '/member.html';
          }
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('d-none');
      }
    });

    // ---- REGISTER ----
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const coopName = document.getElementById('regCoopName').value.trim();
      const adminName = document.getElementById('regAdminName').value.trim();
      const adminPhone = document.getElementById('regAdminPhone').value.trim();
      const adminEmail = document.getElementById('regAdminEmail').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      const errorEl = document.getElementById('registerError');
      const successEl = document.getElementById('registerSuccess');

      errorEl.classList.add('d-none');
      successEl.classList.add('d-none');

      if (!coopName || !adminName || !adminPhone || !password) {
        errorEl.textContent = 'Please fill in all required fields.';
        errorEl.classList.remove('d-none');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cooperativeName: coopName,
            adminFullName: adminName,
            adminPhone,
            adminEmail,
            password,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');

        successEl.textContent = 'Cooperative registered! You can now login.';
        successEl.classList.remove('d-none');
        document.getElementById('registerForm').reset();
        // Switch to login tab
        document.getElementById('login-tab').click();
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
